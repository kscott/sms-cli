name: Tagged Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --product sms-bin

      - name: Rename binary
        run: cp .build/release/sms-bin sms-bin

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Install

            1. Download `sms-bin` below
            2. Move it to `~/bin/sms-bin` (create `~/bin` if needed)
            3. Make it executable: `chmod +x ~/bin/sms-bin`
            4. Grant Full Disk Access to Terminal in System Settings → Privacy & Security

            See the [README](https://github.com/kscott/sms-cli#readme) for full setup instructions.
          files: sms-bin
          make_latest: true
